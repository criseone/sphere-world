<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sphere World</title>
  <style>
    :root {
      --bg: #0e1116;
      --panel: #161b22;
      --panel-hi: #1e242d;
      --line: #2a313c;
      --text: #d6dde6;
      --muted: #8a93a0;
      --accent: #6cb6ff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font: 13px/1.4 system-ui, -apple-system, "Segoe UI", sans-serif; overflow: hidden; }
    #app { display: grid; grid-template-columns: 1fr 340px; height: 100vh; }
    #stage { position: relative; overflow: hidden; min-width: 0; min-height: 0; }
    #main-canvas { position: absolute; inset: 0; width: 100%; height: 100%; cursor: grab; }
    #main-canvas:active { cursor: grabbing; }
    #hud {
      position: absolute; top: 10px; left: 10px;
      padding: 6px 10px; border-radius: 6px;
      background: rgba(14,17,22,.7); backdrop-filter: blur(6px);
      font-variant-numeric: tabular-nums; color: var(--muted);
      pointer-events: none;
    }
    #hud b { color: var(--text); font-weight: 600; }
    #hud-help { font-size: 11px; margin-top: 4px; }

    aside#monitors {
      background: var(--panel);
      border-left: 1px solid var(--line);
      display: flex; flex-direction: column;
      min-width: 0;
    }
    aside#monitors > header {
      padding: 10px 12px; border-bottom: 1px solid var(--line);
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    aside#monitors > header h2 { margin: 0 auto 0 0; font-size: 13px; font-weight: 600; }
    aside#monitors > header label { display: inline-flex; align-items: center; gap: 4px; color: var(--muted); }
    button {
      background: var(--panel-hi); color: var(--text);
      border: 1px solid var(--line); border-radius: 5px;
      padding: 4px 10px; cursor: pointer; font: inherit;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }

    #monitor-list { list-style: none; margin: 0; padding: 8px; overflow-y: auto; flex: 1; }
    .monitor { background: var(--panel-hi); border: 1px solid var(--line); border-radius: 6px; margin-bottom: 8px; overflow: hidden; transition: border-color .15s, box-shadow .15s; }
    .monitor.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
    .monitor > header { display: flex; align-items: center; padding: 6px 8px; border-bottom: 1px solid var(--line); }
    .monitor > header .title { flex: 1; font-weight: 600; font-size: 12px; }
    .monitor > header .orient { padding: 1px 6px; font-size: 10px; font-variant-numeric: tabular-nums; margin-right: 4px; }
    .monitor > header .remove { padding: 0 8px; font-size: 16px; line-height: 1; }
    .monitor canvas { display: block; background: #000; margin: 0 auto; max-width: 100%; }
    .monitor[data-orientation="landscape"] canvas { width: 100%; height: auto; }
    .monitor[data-orientation="portrait"]  canvas { width: auto; height: 320px; }
    .monitor .controls { display: grid; grid-template-columns: auto 1fr auto; gap: 4px 8px; padding: 6px 8px; align-items: center; font-size: 11px; color: var(--muted); }
    .monitor .controls input[type="range"] { width: 100%; }
    .monitor .controls .v { font-variant-numeric: tabular-nums; min-width: 36px; text-align: right; color: var(--text); }
    .monitor .controls .sep { grid-column: 1 / -1; height: 1px; background: var(--line); margin: 4px 0 2px; }
    .monitor .swatch { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 6px; vertical-align: middle; }
  </style>
</head>
<body>
  <div id="app">
    <section id="stage">
      <canvas id="main-canvas"></canvas>
      <div id="hud">
        <div>yaw <b id="hud-yaw">0.00</b> · pitch <b id="hud-pitch">0.00</b> · fov <b id="hud-fov">75</b>° · pos <b id="hud-pos">0,0,0</b></div>
        <div id="hud-help">drag = look/orbit · WASD = move · wheel = zoom · click cam = select · T/R = translate/rotate · Esc = deselect</div>
      </div>
    </section>
    <aside id="monitors">
      <header>
        <h2>Cameras</h2>
        <label><input type="checkbox" id="depth-toggle"> depth</label>
        <label><input type="checkbox" id="overview-toggle"> overview</label>
        <button id="add-cam">+ Camera</button>
        <button id="save-preset" title="Download current setup">Save</button>
        <button id="load-preset" title="Load a preset file">Load</button>
        <input type="file" id="load-input" accept="application/json,.json" hidden>
      </header>
      <ul id="monitor-list"></ul>
    </aside>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./main.js"></script>
</body>
</html>
